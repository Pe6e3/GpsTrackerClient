server {
	listen 80;
	listen [::]:80;
	server_name pe6e3.top;

	location /.well-known/acme-challenge/ {
		root /var/www/certbot;
	}

	location / {
		return 301 https://$host$request_uri;
	}
}

server {
	listen 443 ssl http2;
	listen [::]:443 ssl http2;
	server_name pe6e3.top;

	ssl_certificate /etc/letsencrypt/live/pe6e3.top/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/pe6e3.top/privkey.pem;
	ssl_protocols TLSv1.2 TLSv1.3;

	client_max_body_size 2m;

	location /api/ {
		proxy_pass http://127.0.0.1:5081/api/;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_read_timeout 120s;
	}

	location = /map {
		return 301 /map/;
	}

	location = /map/index.html {
		alias /var/www/GpsTrackerClient/dist/index.html;
		add_header Cache-Control "no-cache, no-store, must-revalidate";
		add_header Pragma "no-cache";
		add_header Expires "0";
	}

	location /map/assets/ {
		alias /var/www/GpsTrackerClient/dist/assets/;
		add_header Cache-Control "public, max-age=31536000, immutable";
	}

	location /map/ {
		alias /var/www/GpsTrackerClient/dist/;
		try_files $uri $uri/ @map_spa;
	}

	location @map_spa {
		add_header Cache-Control "no-cache, no-store, must-revalidate";
		add_header Pragma "no-cache";
		add_header Expires "0";
		rewrite ^ /map/index.html last;
	}

	location / {
		return 301 /map/;
	}
}
